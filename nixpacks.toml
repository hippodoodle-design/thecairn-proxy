# Adds Python 3 to the Nixpacks build environment so youtube-dl-exec's
# postinstall script (a transitive dep of @cairn/shared via the worker's
# media pipeline) can find `python3` on $PATH. Without this, `npm ci`
# fails at the youtube-dl-exec preinstall check.
#
# Uses aptPkgs (Ubuntu apt) rather than nixPkgs because Railway's
# Nixpacks base image is Ubuntu and apt-installed binaries land on
# /usr/bin which is on PATH unconditionally. A previous attempt with
# nixPkgs = ["...", "python312"] did not put `python3` on PATH at the
# preinstall step, so this approach is more direct.
#
# Applies to BOTH @cairn/web and @cairn/worker — they build from the same
# repo root with the NIXPACKS builder declared in railway.json. Web does
# not invoke yt-dlp at runtime, but the worker does, so installing Python
# rather than skipping the check (YOUTUBE_DL_SKIP_PYTHON_CHECK=1) avoids
# a silent runtime failure on the worker the next time it harvests a
# video.

[phases.setup]
aptPkgs = ["python3"]
